<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmishGuard — 404</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #f7f8fc;
      --surface:   #ffffff;
      --border:    #e2e6f0;
      --accent:    #2563eb;
      --accent-bg: #eff5ff;
      --text:      #0f172a;
      --text-muted:#64748b;
      --text-faint:#94a3b8;
      --mono:      'DM Mono', monospace;
      --sans:      'Sora', sans-serif;
      --shadow-lg: 0 12px 40px rgba(15,23,42,.1), 0 2px 8px rgba(15,23,42,.05);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, #d1d5e8 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: .45;
      pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3.5rem 3rem;
      max-width: 440px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .error-code {
      font-family: var(--mono);
      font-size: 5.5rem;
      font-weight: 500;
      color: var(--accent);
      opacity: .12;
      line-height: 1;
      margin-bottom: -.3rem;
      letter-spacing: -.04em;
      user-select: none;
    }

    .icon-wrap {
      width: 60px; height: 60px;
      background: var(--accent-bg);
      border: 1px solid #bfdbfe;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      color: var(--accent);
      margin: 1.2rem auto 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -.03em;
      margin-bottom: .5rem;
    }

    p {
      color: var(--text-muted);
      font-size: .88rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .btn-home {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--accent);
      color: #fff;
      padding: .8rem 1.8rem;
      border-radius: 10px;
      text-decoration: none;
      font-size: .88rem;
      font-weight: 600;
      transition: background .18s, box-shadow .2s, transform .12s;
      box-shadow: 0 2px 12px rgba(37,99,235,.3);
    }
    .btn-home:hover {
      background: #1d4ed8;
      color: #fff;
      box-shadow: 0 4px 20px rgba(37,99,235,.38);
      transform: translateY(-1px);
    }

    .brand {
      position: relative; z-index: 1;
      margin-bottom: 2rem;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.02em;
      text-decoration: none;
    }
    .brand-logo {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: .8rem;
      box-shadow: 0 2px 8px rgba(37,99,235,.35);
    }
  </style>
</head>
<body>

  <a class="brand" href="/">
    <div class="brand-logo"><i class="fa fa-shield-halved"></i></div>
    SmishGuard
  </a>

  <div class="card">
    <div class="error-code">404</div>
    <div class="icon-wrap"><i class="fa fa-map-location-dot"></i></div>
    <h1>Page Not Found</h1>
    <p>This route doesn't exist. Head back to the detector and paste a message to analyze.</p>
    <a href="/" class="btn-home"><i class="fa fa-arrow-left"></i> Return Home</a>
  </div>

</body>
</html>
