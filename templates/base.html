<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>{% block title %}SmishGuard AI{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <!-- Animated mesh background -->
  <div class="bg-scene" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="noise"></div>
  </div>

  <!-- Navbar -->
  <nav class="sg-nav" id="mainNav">
    <div class="nav-inner">

      <a class="nav-logo" href="/">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <polygon points="12,2 21,7 21,17 12,22 3,17 3,7"
                   stroke="currentColor" stroke-width="1.6"
                   fill="none" stroke-linejoin="round"/>
          <polygon points="12,7 17,10 17,15 12,18 7,15 7,10"
                   fill="currentColor" opacity="0.4"/>
        </svg>
        SmishGuard<em>AI</em>
      </a>

      <div class="nav-links" id="navLinks">
        <a href="/" class="nav-link">Home</a>
        <a href="/model" class="nav-link">Model</a>
        <a href="/dataset" class="nav-link">Dataset</a>
        <a href="/about" class="nav-link">About</a>
      </div>

      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme">
          <span class="toggle-track">
            <span class="toggle-thumb">
              <!-- Sun icon -->
              <svg class="t-icon t-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="4"/>
                <line x1="12" y1="2" x2="12" y2="5"/>
                <line x1="12" y1="19" x2="12" y2="22"/>
                <line x1="2" y1="12" x2="5" y2="12"/>
                <line x1="19" y1="12" x2="22" y2="12"/>
                <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/>
                <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
                <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/>
                <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
              </svg>
              <!-- Moon icon -->
              <svg class="t-icon t-moon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
              </svg>
            </span>
          </span>
        </button>

        <button class="nav-burger" id="navBurger" aria-label="Open navigation menu">
          <span></span><span></span><span></span>
        </button>
      </div>

    </div>
  </nav>

  <main class="main-wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="sg-footer">
    <div class="footer-inner">
      <span class="footer-logo">SmishGuard<em>AI</em></span>
      <span class="footer-sep" aria-hidden="true">·</span>
      <span class="footer-copy">© 2025 AI-Powered SMS Threat Detection</span>
    </div>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── Theme ─────────────────────────────────────────────────────────────────
  const html      = document.documentElement;
  const toggleBtn = document.getElementById('themeToggle');
  const saved     = localStorage.getItem('sg-theme') || 'dark';
  html.setAttribute('data-theme', saved);

  toggleBtn.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('sg-theme', next);
  });

  // ── Active link ───────────────────────────────────────────────────────────
  document.querySelectorAll('.nav-link').forEach(l => {
    if (l.href === location.href) l.classList.add('active');
  });

  // ── Scroll shrink ─────────────────────────────────────────────────────────
  const mainNav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => {
    mainNav.classList.toggle('scrolled', scrollY > 40);
  }, { passive: true });

  // ── Mobile toggle ─────────────────────────────────────────────────────────
  document.getElementById('navBurger').addEventListener('click', () => {
    document.getElementById('navLinks').classList.toggle('open');
    document.getElementById('navBurger').classList.toggle('open');
  });
</script>
</body>
</html>
