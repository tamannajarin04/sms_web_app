<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SmishGuard AI{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

  <style>
    /* ═══════════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════════ */
    :root {
      /* Core surfaces */
      --bg:           #07090d;
      --bg-alt:       #090c12;
      --surface:      #0d1018;
      --surface-2:    #111520;
      --surface-3:    #161c2a;
      --surface-4:    #1c2438;

      /* Borders */
      --border:       rgba(255,255,255,.06);
      --border-2:     rgba(255,255,255,.09);
      --border-3:     rgba(255,255,255,.13);

      /* Accent — clean emerald */
      --accent:       #10d17c;
      --accent-dim:   #0db569;
      --accent-glow:  rgba(16,209,124,.18);
      --accent-glass: rgba(16,209,124,.06);
      --accent-text:  #10d17c;
      --accent-pale:  rgba(16,209,124,.55);

      /* Danger */
      --danger:       #f04f5c;
      --danger-bg:    rgba(240,79,92,.07);
      --danger-border:rgba(240,79,92,.22);

      /* Warning */
      --warn:         #f5a623;
      --warn-bg:      rgba(245,166,35,.07);
      --warn-border:  rgba(245,166,35,.22);

      /* Text */
      --text:         #e8edf5;
      --text-2:       #aab4c4;
      --text-muted:   #62748a;
      --text-faint:   #2e3d50;

      /* Typography */
      --font-display: 'Geist', sans-serif;
      --font-body:    'Geist', sans-serif;
      --font-serif:   'Instrument Serif', serif;
      --font-mono:    'Geist Mono', monospace;

      /* Radii */
      --r-xs: 4px;
      --r-sm: 6px;
      --r:    10px;
      --r-lg: 14px;
      --r-xl: 20px;

      /* Nav */
      --nav-h: 58px;

      /* Shadows */
      --shadow-sm: 0 1px 3px rgba(0,0,0,.5);
      --shadow:    0 4px 24px rgba(0,0,0,.6);
      --shadow-lg: 0 16px 64px rgba(0,0,0,.7);
    }

    [data-theme="light"] {
      --bg:           #f5f6f8;
      --bg-alt:       #eef0f4;
      --surface:      #ffffff;
      --surface-2:    #f2f4f7;
      --surface-3:    #eaecf1;
      --surface-4:    #e2e5ec;
      --border:       rgba(0,0,0,.07);
      --border-2:     rgba(0,0,0,.11);
      --border-3:     rgba(0,0,0,.16);
      --accent:       #009957;
      --accent-dim:   #007d48;
      --accent-glow:  rgba(0,153,87,.12);
      --accent-glass: rgba(0,153,87,.06);
      --accent-text:  #007848;
      --accent-pale:  rgba(0,153,87,.45);
      --danger:       #dc2f42;
      --danger-bg:    rgba(220,47,66,.06);
      --danger-border:rgba(220,47,66,.2);
      --warn:         #d08b00;
      --warn-bg:      rgba(208,139,0,.06);
      --warn-border:  rgba(208,139,0,.2);
      --text:         #0f1621;
      --text-2:       #374559;
      --text-muted:   #5c6e83;
      --text-faint:   #a0b0c2;
    }

    /* ═══════════════════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background .3s, color .3s;
    }

    /* Refined grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient top glow */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 480px;
      background: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(16,209,124,.05) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════════════════════
       NAVBAR
    ═══════════════════════════════════════════════════════════ */
    .navbar {
      position: sticky; top: 0; z-index: 200;
      height: var(--nav-h);
      background: rgba(7,9,13,.75);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      transition: background .3s, border-color .3s;
    }
    [data-theme="light"] .navbar {
      background: rgba(255,255,255,.8);
    }

    .nav-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Brand */
    .brand {
      display: flex; align-items: center; gap: .75rem;
      text-decoration: none; color: var(--text);
      justify-self: start;
    }
    .brand-icon {
      width: 30px; height: 30px;
      border: 1px solid rgba(16,209,124,.3);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem;
      color: var(--accent-text);
      background: var(--accent-glass);
      position: relative;
      flex-shrink: 0;
      transition: border-color .2s, background .2s;
    }
    .brand:hover .brand-icon {
      border-color: rgba(16,209,124,.55);
      background: rgba(16,209,124,.1);
    }
    .brand-wordmark {
      display: flex; flex-direction: column; gap: 1px;
    }
    .brand-name {
      font-family: var(--font-display);
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: -.01em;
      line-height: 1;
      color: var(--text);
    }
    .brand-name em {
      font-style: normal;
      color: var(--accent-text);
    }
    .brand-tag {
      font-family: var(--font-mono);
      font-size: .5rem;
      font-weight: 400;
      color: var(--text-faint);
      letter-spacing: .18em;
      text-transform: uppercase;
      line-height: 1;
    }

    /* Nav links — centered column */
    .nav-links {
      display: flex; align-items: center; gap: 2px;
      list-style: none;
      justify-self: center;
    }
    .nav-links a {
      font-family: var(--font-body);
      font-size: .8rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: .35rem .85rem;
      border-radius: var(--r-sm);
      transition: color .15s, background .15s;
      letter-spacing: .01em;
      position: relative;
    }
    .nav-links a:hover {
      color: var(--text-2);
      background: var(--surface-2);
    }
    .nav-links a.active {
      color: var(--accent-text);
      background: var(--accent-glass);
    }
    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 50%;
      transform: translateX(-50%);
      width: 16px; height: 1.5px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    /* Nav right */
    .nav-right {
      display: flex; align-items: center; gap: .5rem;
      justify-self: end;
    }

    .nav-pill {
      display: flex; align-items: center; gap: .45rem;
      font-family: var(--font-mono);
      font-size: .6rem; font-weight: 400;
      color: var(--accent-text);
      background: var(--accent-glass);
      border: 1px solid rgba(16,209,124,.15);
      border-radius: 100px;
      padding: .26rem .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .pulse {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,209,124,.4); }
      50%       { opacity: .7; box-shadow: 0 0 0 3px rgba(16,209,124,0); }
    }

    .icon-btn {
      width: 30px; height: 30px;
      background: transparent;
      border: 1px solid var(--border-2);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: .72rem;
      cursor: pointer;
      transition: all .15s;
    }
    .icon-btn:hover {
      background: var(--surface-2);
      border-color: var(--border-3);
      color: var(--text);
    }

    /* ═══════════════════════════════════════════════════════════
       ANNOUNCEMENT BAR (optional)
    ═══════════════════════════════════════════════════════════ */
    .announcement {
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      padding: .55rem 2rem;
      display: flex; align-items: center; justify-content: center; gap: .75rem;
      font-family: var(--font-mono);
      font-size: .62rem; font-weight: 400;
      color: var(--text-muted); letter-spacing: .04em;
      position: relative; z-index: 1;
    }
    .announcement-badge {
      background: var(--accent-glass);
      border: 1px solid rgba(16,209,124,.2);
      border-radius: 3px;
      padding: .1rem .45rem;
      font-size: .55rem; font-weight: 500;
      color: var(--accent-text); letter-spacing: .1em; text-transform: uppercase;
    }

    /* ═══════════════════════════════════════════════════════════
       MAIN
    ═══════════════════════════════════════════════════════════ */
    .site-main { flex: 1; position: relative; z-index: 1; }

    /* ═══════════════════════════════════════════════════════════
       PAGE HEADER
    ═══════════════════════════════════════════════════════════ */
    .page-header {
      max-width: 1200px; margin: 0 auto;
      padding: 6rem 2rem 3.5rem;
      position: relative;
    }

    /* Horizontal rule above eyebrow */
    .page-header-rule {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2rem;
    }
    .page-header-rule::before {
      content: '';
      width: 32px; height: 1px;
      background: var(--accent);
      border-radius: 1px;
    }
    .page-eyebrow {
      font-family: var(--font-mono);
      font-size: .62rem; font-weight: 400;
      color: var(--accent-text);
      letter-spacing: .16em; text-transform: uppercase;
    }

    .page-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 5vw, 4.2rem);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -.03em;
      margin-bottom: 1.25rem;
      color: var(--text);
    }
    .page-header h1 .hl    { color: var(--accent-text); }
    .page-header h1 .serif { font-family: var(--font-serif); font-weight: 400; font-style: italic; }
    .page-header h1 .ghost {
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,.15);
    }
    [data-theme="light"] .page-header h1 .ghost {
      -webkit-text-stroke: 1px rgba(0,0,0,.15);
    }

    .page-header p {
      font-size: .92rem; font-weight: 400;
      color: var(--text-muted); line-height: 1.85;
      max-width: 460px;
    }

    /* ═══════════════════════════════════════════════════════════
       CONTENT WRAP
    ═══════════════════════════════════════════════════════════ */
    .content-wrap {
      max-width: 1200px; margin: 0 auto 8rem;
      padding: 0 2rem;
    }

    /* ═══════════════════════════════════════════════════════════
       CARDS
    ═══════════════════════════════════════════════════════════ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 2rem 2.25rem;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
      transition: background .3s, border-color .3s, box-shadow .2s;
    }
    .card:hover {
      border-color: var(--border-2);
      box-shadow: 0 0 0 1px var(--border), var(--shadow);
    }

    /* Subtle top glow line */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 2rem; right: 2rem; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-3), transparent);
    }

    /* Card numbered label */
    .s-label {
      display: flex; align-items: center; gap: .75rem;
      font-family: var(--font-mono);
      font-size: .6rem; font-weight: 500;
      color: var(--text-faint);
      text-transform: uppercase; letter-spacing: .16em;
      margin-bottom: 1.75rem;
    }
    .s-label .s-num {
      font-family: var(--font-mono);
      font-size: .58rem;
      color: var(--accent-text);
      border: 1px solid rgba(16,209,124,.22);
      background: var(--accent-glass);
      border-radius: var(--r-xs);
      padding: .1rem .42rem;
      letter-spacing: .04em;
    }
    .s-label::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* Card title */
    .card-title {
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 600;
      letter-spacing: -.02em;
      color: var(--text);
      margin-bottom: .5rem;
      line-height: 1.2;
    }

    /* ═══════════════════════════════════════════════════════════
       DIVIDER
    ═══════════════════════════════════════════════════════════ */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }

    /* ═══════════════════════════════════════════════════════════
       BODY TEXT
    ═══════════════════════════════════════════════════════════ */
    .body-p {
      font-size: .88rem; color: var(--text-muted); line-height: 1.9;
      margin-bottom: .9rem;
    }
    .body-p:last-child { margin-bottom: 0; }
    .body-p strong { color: var(--text-2); font-weight: 600; }

    /* ═══════════════════════════════════════════════════════════
       CODE
    ═══════════════════════════════════════════════════════════ */
    .code-block {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }
    .code-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: .55rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .code-dots { display: flex; gap: .32rem; }
    .cd { width: 8px; height: 8px; border-radius: 50%; opacity: .6; }
    .cd.r { background: #ff5f57; }
    .cd.y { background: #ffbd2e; }
    .cd.g { background: #28ca41; }
    .code-lang {
      font-family: var(--font-mono); font-size: .58rem;
      color: var(--text-faint); letter-spacing: .12em; text-transform: uppercase;
    }
    pre {
      font-family: var(--font-mono);
      font-size: .76rem; line-height: 1.9;
      color: var(--text-2);
      padding: 1.1rem 1.25rem;
      overflow-x: auto; margin: 0;
    }
    .kw   { color: #c594cf; }
    .str  { color: var(--accent-text); }
    .str2 { color: #e5c07b; }
    .num  { color: #61afef; }
    .cm   { color: var(--text-faint); font-style: italic; }
    .fn   { color: #e5c07b; }
    code {
      font-family: var(--font-mono); font-size: .75rem;
      color: var(--accent-text);
      background: var(--accent-glass);
      border: 1px solid rgba(16,209,124,.12);
      border-radius: 3px; padding: .08rem .42rem;
    }

    /* ═══════════════════════════════════════════════════════════
       METRIC TILE
    ═══════════════════════════════════════════════════════════ */
    .metric-tile {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.75rem 1.5rem;
      position: relative;
      transition: border-color .2s, transform .2s;
    }
    .metric-tile:hover {
      border-color: var(--border-2);
      transform: translateY(-2px);
    }
    .metric-num {
      font-family: var(--font-display);
      font-size: 2.4rem; font-weight: 700;
      color: var(--text);
      line-height: 1;
      letter-spacing: -.04em;
    }
    .metric-num span { color: var(--accent-text); }
    .metric-label {
      font-family: var(--font-mono);
      font-size: .58rem; font-weight: 400;
      color: var(--text-faint);
      text-transform: uppercase; letter-spacing: .14em;
      margin-top: .5rem;
    }
    .metric-trend {
      display: inline-flex; align-items: center; gap: .3rem;
      font-family: var(--font-mono); font-size: .62rem;
      color: var(--accent-text);
      background: var(--accent-glass);
      border-radius: var(--r-xs);
      padding: .12rem .4rem;
      margin-top: .4rem;
    }

    /* ═══════════════════════════════════════════════════════════
       BADGE
    ═══════════════════════════════════════════════════════════ */
    .badge {
      display: inline-flex; align-items: center; gap: .35rem;
      font-family: var(--font-mono);
      font-size: .58rem; font-weight: 500;
      border-radius: var(--r-xs);
      padding: .15rem .55rem;
      text-transform: uppercase; letter-spacing: .1em;
      white-space: nowrap;
    }
    .badge-accent  { color: var(--accent-text); background: var(--accent-glass); border: 1px solid rgba(16,209,124,.2); }
    .badge-danger  { color: var(--danger); background: var(--danger-bg); border: 1px solid var(--danger-border); }
    .badge-warn    { color: var(--warn); background: var(--warn-bg); border: 1px solid var(--warn-border); }
    .badge-neutral { color: var(--text-muted); background: var(--surface-3); border: 1px solid var(--border-2); }

    /* ═══════════════════════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════════════════════ */
    .btn-primary {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--accent); color: #000;
      border: none; border-radius: var(--r-sm);
      padding: .72rem 1.7rem;
      font-family: var(--font-display);
      font-size: .85rem; font-weight: 600;
      text-decoration: none; letter-spacing: -.01em;
      cursor: pointer;
      transition: background .15s, transform .12s, box-shadow .2s;
      box-shadow: 0 1px 0 rgba(0,0,0,.3), 0 0 0 1px rgba(16,209,124,.6);
    }
    .btn-primary:hover {
      background: var(--accent-dim); color: #000;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(16,209,124,.3), 0 0 0 1px rgba(16,209,124,.5);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: .5rem;
      background: transparent; color: var(--text-2);
      border: 1px solid var(--border-2);
      border-radius: var(--r-sm);
      padding: .7rem 1.55rem;
      font-family: var(--font-body);
      font-size: .85rem; font-weight: 500;
      text-decoration: none; letter-spacing: .01em;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-ghost:hover {
      background: var(--surface-2); color: var(--text);
      border-color: var(--border-3);
      transform: translateY(-1px);
    }

    .btn-text {
      display: inline-flex; align-items: center; gap: .4rem;
      background: none; border: none;
      color: var(--accent-text);
      font-family: var(--font-body);
      font-size: .82rem; font-weight: 500;
      cursor: pointer; padding: 0;
      text-decoration: none;
      transition: opacity .15s, gap .15s;
    }
    .btn-text:hover { opacity: .7; gap: .6rem; }

    /* ═══════════════════════════════════════════════════════════
       CTA BLOCK
    ═══════════════════════════════════════════════════════════ */
    .cta-block {
      border: 1px solid var(--border-2);
      border-radius: var(--r-xl);
      padding: 5rem 2.5rem;
      text-align: center;
      position: relative; overflow: hidden;
      background: var(--surface);
    }

    /* Gradient mesh inside CTA */
    .cta-block::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 20% 50%, rgba(16,209,124,.05), transparent),
        radial-gradient(ellipse 50% 50% at 80% 30%, rgba(16,209,124,.03), transparent);
      pointer-events: none;
    }

    .cta-block::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 10%, var(--border-3) 50%, transparent 90%);
    }

    .cta-eyebrow {
      font-family: var(--font-mono); font-size: .6rem; font-weight: 400;
      color: var(--accent-text); text-transform: uppercase;
      letter-spacing: .18em; margin-bottom: .85rem;
      position: relative; z-index: 1;
    }

    .cta-title {
      font-family: var(--font-display);
      font-size: clamp(1.9rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--text); line-height: 1.05;
      margin-bottom: 1rem;
      letter-spacing: -.03em;
      position: relative; z-index: 1;
    }
    .cta-title .serif {
      font-family: var(--font-serif);
      font-weight: 400; font-style: italic;
    }

    .cta-sub {
      font-size: .88rem; color: var(--text-muted); line-height: 1.75;
      max-width: 360px; margin: 0 auto 2.5rem;
      position: relative; z-index: 1;
    }

    .cta-actions {
      display: flex; align-items: center; justify-content: center;
      gap: .75rem; flex-wrap: wrap;
      position: relative; z-index: 1;
    }

    /* ═══════════════════════════════════════════════════════════
       FORM ELEMENTS
    ═══════════════════════════════════════════════════════════ */
    .form-input {
      width: 100%;
      background: var(--bg-alt);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      padding: .85rem 1.1rem;
      font-family: var(--font-body);
      font-size: .88rem;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      resize: vertical;
    }
    .form-input::placeholder { color: var(--text-faint); }
    .form-input:focus {
      border-color: rgba(16,209,124,.4);
      box-shadow: 0 0 0 3px rgba(16,209,124,.08);
    }

    /* ═══════════════════════════════════════════════════════════
       RESULT STATES
    ═══════════════════════════════════════════════════════════ */
    .result-safe {
      background: rgba(16,209,124,.05);
      border: 1px solid rgba(16,209,124,.2);
      border-radius: var(--r-lg);
    }
    .result-danger {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      border-radius: var(--r-lg);
    }
    .result-warn {
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: var(--r-lg);
    }

    /* ═══════════════════════════════════════════════════════════
       PROGRESS BAR
    ═══════════════════════════════════════════════════════════ */
    .progress-track {
      height: 4px; background: var(--surface-3);
      border-radius: 100px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      transition: width .5s cubic-bezier(.25,.8,.25,1);
    }

    /* ═══════════════════════════════════════════════════════════
       TABLE
    ═══════════════════════════════════════════════════════════ */
    .data-table {
      width: 100%; border-collapse: collapse;
      font-size: .82rem;
    }
    .data-table thead th {
      font-family: var(--font-mono);
      font-size: .58rem; font-weight: 500;
      color: var(--text-faint);
      text-transform: uppercase; letter-spacing: .12em;
      padding: .65rem .85rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .data-table tbody td {
      padding: .75rem .85rem;
      color: var(--text-2);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: var(--surface-2); }

    /* ═══════════════════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════════════════ */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      position: relative; z-index: 1;
    }
    .footer-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 1.4rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: .75rem;
    }
    .footer-left {
      display: flex; align-items: center; gap: 1.5rem;
    }
    .footer-brand {
      display: flex; align-items: center; gap: .55rem;
      text-decoration: none;
    }
    .footer-brand-icon {
      width: 22px; height: 22px;
      background: var(--accent-glass);
      border: 1px solid rgba(16,209,124,.18);
      border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-text); font-size: .58rem;
    }
    .footer-brand-name {
      font-family: var(--font-display);
      font-size: .8rem; font-weight: 600;
      color: var(--text-muted); letter-spacing: -.01em;
    }
    .footer-brand-name em { font-style: normal; color: var(--accent-text); }
    .footer-sep {
      width: 1px; height: 14px;
      background: var(--border-2);
    }
    .footer-copy {
      font-size: .68rem; color: var(--text-faint);
      font-family: var(--font-mono); letter-spacing: .04em;
    }
    .footer-nav { display: flex; gap: 1.25rem; }
    .footer-nav a {
      font-size: .76rem; color: var(--text-muted);
      text-decoration: none; transition: color .13s;
      font-weight: 500;
    }
    .footer-nav a:hover { color: var(--text); }

    /* ═══════════════════════════════════════════════════════════
       UTILITY
    ═══════════════════════════════════════════════════════════ */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ═══════════════════════════════════════════════════════════
       MOBILE
    ═══════════════════════════════════════════════════════════ */
    @media (max-width: 860px) {
      .nav-links { display: none; }
      .nav-inner { grid-template-columns: 1fr auto; }
      .page-header { padding: 3.5rem 1.25rem 2.5rem; }
      .content-wrap { padding: 0 1.25rem; margin-bottom: 5rem; }
      .card { padding: 1.5rem 1.25rem; }
      .footer-inner { padding: 1.2rem 1.25rem; }
      .announcement { display: none; }
    }
  </style>

  {% block head_extra %}{% endblock %}
</head>
<body>

<!-- ══ ANNOUNCEMENT BAR ════════════════════════════════════ -->
{% block announcement %}{% endblock %}

<!-- ══ NAVBAR ═══════════════════════════════════════════════ -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">

    <a class="brand" href="/" aria-label="SmishGuard AI — Home">
      <div class="brand-icon" aria-hidden="true">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <div class="brand-wordmark">
        <span class="brand-name">Smish<em>Guard</em></span>
        <span class="brand-tag">AI Security</span>
      </div>
    </a>

    <ul class="nav-links" role="list">
      <li><a href="/"        {% if active_page == 'home'    %}class="active" aria-current="page"{% endif %}>Detector</a></li>
      <li><a href="/model"   {% if active_page == 'model'   %}class="active" aria-current="page"{% endif %}>Model</a></li>
      <li><a href="/dataset" {% if active_page == 'dataset' %}class="active" aria-current="page"{% endif %}>Dataset</a></li>
      <li><a href="/about"   {% if active_page == 'about'   %}class="active" aria-current="page"{% endif %}>About</a></li>
    </ul>

    <div class="nav-right">
      <div class="nav-pill" aria-label="System status: online">
        <span class="pulse" aria-hidden="true"></span>
        Online
      </div>
      <button class="icon-btn" id="themeBtn" aria-label="Toggle color theme">
        <i class="fa-solid fa-moon" id="themeIcon" aria-hidden="true"></i>
      </button>
    </div>

  </div>
</nav>

<!-- ══ PAGE CONTENT ════════════════════════════════════════ -->
<main class="site-main">
  {% block content %}{% endblock %}
</main>

<!-- ══ FOOTER ══════════════════════════════════════════════ -->
<footer role="contentinfo">
  <div class="footer-inner">
    <div class="footer-left">
      <a class="footer-brand" href="/" aria-label="SmishGuard home">
        <div class="footer-brand-icon" aria-hidden="true"><i class="fa-solid fa-shield-halved"></i></div>
        <span class="footer-brand-name">Smish<em>Guard</em></span>
      </a>
      <div class="footer-sep" aria-hidden="true"></div>
      <span class="footer-copy">© 2025 — NLP Smishing Detection</span>
    </div>
    <nav class="footer-nav" aria-label="Footer navigation">
      <a href="/">Detector</a>
      <a href="/model">Model</a>
      <a href="/dataset">Dataset</a>
      <a href="/about">About</a>
    </nav>
  </div>
</footer>

<!-- Theme toggle -->
<script>
  (function() {
    const html      = document.documentElement;
    const themeBtn  = document.getElementById('themeBtn');
    const themeIcon = document.getElementById('themeIcon');
    const saved     = localStorage.getItem('sg-theme') || 'dark';

    html.setAttribute('data-theme', saved);
    applyIcon(saved);

    themeBtn.addEventListener('click', function() {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('sg-theme', next);
      applyIcon(next);
    });

    function applyIcon(t) {
      themeIcon.className = t === 'dark'
        ? 'fa-solid fa-sun'
        : 'fa-solid fa-moon';
    }
  })();
</script>

{% block scripts %}{% endblock %}

</body>
</html>
